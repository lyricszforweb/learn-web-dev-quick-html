<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Independent Video Ad Player</title>

    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

    
    <!-- Video.js Framework Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/video.js/7.0.0/video-js.min.css" integrity="sha512-zki7IiwYvLzVZouKA+V/vtIuW7cK8M2ug1kaRBItuBWG8TDvA6jrtjhKPOrz3RFGpt9OQC/xE7DUfsrHxoBXxg==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/7.0.0/video.min.js" integrity="sha512-LiILFcpZ9QKSH41UkK59Zag/7enHzqjr5lO2M0wGqGn8W19A/x2rV3iufAHkEtrln+Bt+Zv1U6NlLIp+lEqeWQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: auto;
            text-align: center;
            overflow: hidden;
        }

        .video-container { max-width: 640px; margin: 30px auto; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%)}
        .ad-banner-overlay {
            position: absolute;
            top: 10px;
            left: 10px; 
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 5px 10px; font-family: sans-serif; font-size: 12px;
            z-index: 10; display: none; pointer-events: none;
        }

        video {
            display: inline-block;
            aspect-ratio: 16/9;
            max-width: 100vw;
        }

        progress {
            width: 70%;
        }
        h2, p {
            color: gold;
        }
    </style>
</head>
<body>

<progress></progress>
<h2>ADS Helps to Keep our Mission!</h2>
<p>Avoid unnecessary clicks</p>
<div class="video-container">
    <!-- Ad notice element -->
    <div id="ad-notice" class="ad-banner-overlay">Advertisement</div>
    
    <!-- HTML5 Video Element -->
    <video id="my-local-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" autoplay width="640%" height="320%" poster="">
        <source src="" type="video/mp4" >
    </video>
</div>

<script>
    // 1. Define your VAST Tag URL directly 
    const VAST_TAG_URL = ["https://expensive-pollution.com/dmmgF.zCdvGDNJvJZaGNUj/ge_mE9ou/ZOUnlDkTP/TYcyxDNUD/QcyJN/j/U/tqNvz/Ev0FN/DYIQ2sOWSlZtsda/WH1JpPdJDv0Wxg",
    "https://youradexchange.com/video/select.php?r=11470838"][Math.floor(Math.random() * 2)]

    // 2. Initialize the Video.js Player
    const player = videojs('my-local-player');
    const adNotice = document.getElementById('ad-notice');
    // Store the main content video URL to return to it later
    const mainContentSrc = player.currentSrc();

    // 3. Native JavaScript VAST Parser Engine
    function playNativeVastAd() {
        // Fetch the VAST XML file directly using the browser's native fetch API
        fetch(VAST_TAG_URL)
            .then(response => {
                if (!response.ok) throw new Error("Network response error fetching VAST file");
                return response.text();
            })
            .then(str => {
                // Parse raw XML text into a navigable DOM object
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(str, "text/xml");
                
                // Extract the MP4 file link from the XML nodes
                const mediaFileNode = xmlDoc.getElementsByTagName("MediaFile")[0];
                const trackingNodes = xmlDoc.getElementsByTagName("Tracking");
                
                if (!mediaFileNode) {
                    console.warn("No playable media file node found in VAST XML. Bypassing to content.");
                    return;
                }

                const adVideoUrl = mediaFileNode.textContent.trim();
                
                // Extract tracking pixels (like 'start' impressions)
                let impressionUrls = [];
                const impressionNodes = xmlDoc.getElementsByTagName("Impression");
                for(let i=0; i < impressionNodes.length; i++) {
                    impressionUrls.push(impressionNodes[i].textContent.trim());
                }

                // 4. Swap Video Content to Execute the Ad Playback
                executeAdPlayback(adVideoUrl, impressionUrls);
            })
            .catch(err => {
                console.error("VAST Parsing Failed: ", err);
                // Fail-safe: if the ad crashes or fails to load, ensure your main video still plays
                resumeMainContent();
            });
    }

    function executeAdPlayback(adUrl, trackingPixels) {
        // Show advertisement badge overlay
        adNotice.style.display = 'block';

        // Swap source to the ad video payload
        player.src({ type: 'video/mp4', src: adUrl });
        player.load();
        
        // Fire the tracking pixels to notify the ad server of a successful play
        trackingPixels.forEach(url => {
            const img = new Image();
            img.src = url;
        });

        player.play();

        // Listen for the ad video to finish playing
        player.one('ended', function() {
            playNativeVastAd()
        });
    }

    function resumeMainContent() {
        // Hide ad notice overlay
        adNotice.style.display = 'none';
        
        // Re-assign your website's main underlying video
        player.src({ type: 'video/mp4', src: mainContentSrc });
        player.load();
        player.play();
    }

    // Trigger the VAST engine immediately when the user initiates video playback
    player.one('play', function() {
        player.pause(); // Intercept content execution
        //playNativeVastAd(); // Route to internal XML parser
    });

    playNativeVastAd()
</script>

</body>
</html>
